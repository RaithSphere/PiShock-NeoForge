name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (example: v1.2.3). Leave blank to auto-generate."
        required: false
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release artifact
        run: ./gradlew --no-daemon clean build -x test

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="manual-${GITHUB_RUN_NUMBER}"
          fi

          prerelease="false"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${{ github.event.inputs.prerelease }}" == "true" ]]; then
            prerelease="true"
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "name=PiShock ${tag}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files: |
            build/libs/*.jar
